name: OCI Ampere VM Creator

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  create-vm:
    runs-on: ubuntu-latest
    steps:

      - name: Install OCI CLI
        run: pip install oci-cli --quiet

      - name: Configure OCI credentials
        run: |
          mkdir -p /home/runner/.oci
          echo "${{ secrets.OCI_CONFIG }}" > /home/runner/.oci/config
          echo "${{ secrets.OCI_KEY_PEM }}" > /home/runner/.oci/key.pem
          chmod 600 /home/runner/.oci/key.pem
          chmod 600 /home/runner/.oci/config
          # Corregir la ruta del key en el config
          sed -i 's|key_file=.*|key_file=/home/runner/.oci/key.pem|' /home/runner/.oci/config
          cat /home/runner/.oci/config  # debug: verificar contenido

      - name: Try to create Ampere VM
        id: create_vm
        run: |
          echo "🔄 Intentando crear VM - $(date)"

          OUTPUT=$(oci compute instance launch \
            --availability-domain "${{ secrets.OCI_AD }}" \
            --compartment-id "${{ secrets.OCI_COMPARTMENT_ID }}" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus": 3, "memoryInGBs": 18}' \
            --subnet-id "${{ secrets.OCI_SUBNET_ID }}" \
            --image-id "${{ secrets.OCI_IMAGE_ID }}" \
            --ssh-authorized-keys-file <(echo "${{ secrets.OCI_SSH_PUB_KEY }}") \
            --boot-volume-size-in-gbs 47 \
            --display-name "ampere-vm" \
            --assign-public-ip true \
            2>&1 || true)

          # Debug: mostrar respuesta completa
          echo "=== RESPUESTA OCI ==="
          echo "$OUTPUT"
          echo "=== FIN RESPUESTA ==="

          echo "OUTPUT<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if echo "$OUTPUT" | grep -qE "PROVISIONING|RUNNING"; then
            echo "created=true" >> $GITHUB_OUTPUT
          elif echo "$OUTPUT" | grep -q "Out of host capacity"; then
            echo "created=false" >> $GITHUB_OUTPUT
            echo "reason=no_capacity" >> $GITHUB_OUTPUT
          else
            echo "created=false" >> $GITHUB_OUTPUT
            echo "reason=unknown_error" >> $GITHUB_OUTPUT
          fi

      - name: Notify success on Telegram
        if: steps.create_vm.outputs.created == 'true'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="✅ *¡VM Ampere creada exitosamente!*
